name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Guards
    runs-on: macos-14
    # Needed for the tag-triggered "Publish GitHub Release" step below to
    # create a release with the default GITHUB_TOKEN. Harmless on push/PR
    # runs against main — nothing else in this job writes anything, and
    # GitHub already forces a read-only token on pull_request runs from
    # forks regardless of what's declared here.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secrets / CLAUDE.md guard
        run: |
          set -euo pipefail
          # CLAUDE.md is internal-only working notes for Claude Code — it
          # must only ever exist locally via .gitignore, never tracked in
          # this public repo.
          if git ls-files | grep -qx "CLAUDE.md"; then
            echo "ERROR: CLAUDE.md must never be tracked in this repo." >&2
            exit 1
          fi
          # Backstop, not a full secret scanner: catches the common
          # "identifier = long token-shaped literal" assignment shape
          # anywhere in tracked source. Deliberately narrow (assignment,
          # not just word proximity) to stay low-false-positive.
          PATTERN='(token|secret|api[_-]?key|password)[[:space:]]*[:=][[:space:]]*"[A-Za-z0-9_-]{20,}"'
          if git grep -nIE "$PATTERN" -- . > /tmp/secret-guard-matches.txt; then
            echo "ERROR: possible hardcoded secret found:" >&2
            cat /tmp/secret-guard-matches.txt >&2
            exit 1
          fi
          echo "Secrets/CLAUDE.md guard passed."

      - name: swift build
        run: swift build

      - name: Unit tests
        run: Scripts/run-tests.sh

      - name: Localizable.strings key parity (en <-> pt-BR)
        run: Scripts/check-localization-parity.sh

      # P1 (build-artifact plan): `swift build` above only proves the debug
      # build compiles — it says nothing about the actual shippable .app
      # (Info.plist substitution, icon assembly, ad-hoc signing), which is a
      # distinct step this project's own zsc-control -> zsc-osx-app rename
      # incident showed can silently diverge from a plain build. This
      # exercises that real packaging path on every push/PR too, and the
      # uploaded artifact gives a reviewer a build to click through without
      # a local checkout.
      - name: Determine app version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: Scripts/build-app-bundle.sh

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroserver-control-app-${{ github.sha }}
          path: dist/
          if-no-files-found: error

      # Only meaningful on a tag push (see the `tags: ['v*']` trigger
      # above) — re-reads the actual built Info.plist rather than assuming
      # the sed substitution in build-app-bundle.sh succeeded, so "About"
      # can never silently drift from what a release tag says it is.
      - name: Verify tag matches built version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          BUILT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "dist/ZeroServer Control.app/Contents/Info.plist")"
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$BUILT_VERSION" != "$EXPECTED" ]; then
            echo "ERROR: built CFBundleShortVersionString ($BUILT_VERSION) does not match the tag-derived version ($EXPECTED)." >&2
            exit 1
          fi
          echo "Tag/version consistency OK ($BUILT_VERSION)."

      # Release-engineering plan, Stage 1: a pushed `v*` tag becomes a real,
      # downloadable GitHub Release automatically — providers get a stable
      # link (.../releases/latest) instead of "clone and build it yourself"
      # being the only option. Still ad-hoc signed (see build-app-bundle.sh)
      # until Stage 2 (Developer ID + notarization) lands; the right-click
      # > Open step is unchanged for now.
      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          # ditto, not zip: preserves the .app bundle's resource forks/
          # extended attributes and code signature correctly, which a plain
          # `zip` can mangle — the standard, Apple-recommended way to
          # archive a .app for distribution (matters even more once Stage 2
          # adds real signing/notarization to this same archive).
          ditto -c -k --keepParent "dist/ZeroServer Control.app" "ZeroServerControl-${{ steps.version.outputs.version }}.zip"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ZeroServerControl-${{ steps.version.outputs.version }}.zip
          # 0.x is still beta (see build-app-bundle.sh's own VERSION
          # default/comment) — flag every release as such until a real 1.0.
          prerelease: true
          generate_release_notes: true
